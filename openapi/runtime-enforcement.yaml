openapi: 3.1.0
info:
  title: Sec0 Runtime Enforcement Protocol
  version: 2026-02-01
  description: >-
    Runtime decision contract consumed by sec0 runtime adapters.
    This is a protocol-only specification, not a runtime engine implementation.
servers:
  - url: https://runtime.sec0.internal
security:
  - bearerAuth: []
paths:
  /v1/runtime/evaluate:
    post:
      operationId: evaluateRuntimeDecision
      summary: Evaluate runtime enforcement decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeDecisionRequest'
      responses:
        '200':
          description: Runtime decision generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeDecisionResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeErrorResponse'
        '401':
          description: Authentication/authorization failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeErrorResponse'
        '408':
          description: Runtime decision timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeErrorResponse'
        '429':
          description: Runtime decision rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeErrorResponse'
        '500':
          description: Runtime engine internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RuntimeDecisionRequest:
      type: object
      required:
        - protocolVersion
        - context
        - enforcement
        - input
      properties:
        protocolVersion:
          type: string
          minLength: 1
          example: '2026-02-01'
        requestId:
          type: string
          description: Caller-provided id for correlation and idempotency.
        context:
          $ref: '#/components/schemas/RuntimeContext'
        enforcement:
          $ref: '#/components/schemas/RuntimeEnforcementPolicy'
        input:
          $ref: '#/components/schemas/RuntimeInput'
    RuntimeContext:
      type: object
      required:
        - integrationSurface
        - executionLayer
        - server
        - tool
      properties:
        integrationSurface:
          type: string
          enum: ['@coreax/sdk']
        executionLayer:
          type: string
          enum: ['middleware', 'gateway', 'decorator']
        tenant:
          type: string
        server:
          type: string
        tool:
          type: string
        nodeId:
          type: string
        runId:
          type: string
        metadata:
          type: object
          additionalProperties: true
    RuntimeEnforcementPolicy:
      type: object
      required:
        - mode
      properties:
        mode:
          type: string
          enum: ['observe', 'enforce']
        strategy:
          type: string
          enum: ['deny_on_match', 'deny_on_any']
          default: deny_on_match
        denyOn:
          type: array
          items:
            type: string
          description: Reason codes that become deny candidates in deny_on_match mode.
        forceDeny:
          type: boolean
          default: false
          description: Override to deny whenever reasons are present.
    RuntimeInput:
      type: object
      required:
        - reasons
      properties:
        reasons:
          type: array
          items:
            type: string
        riskTags:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties: true
    RuntimeDecisionResponse:
      type: object
      required:
        - protocolVersion
        - decision
      properties:
        protocolVersion:
          type: string
          minLength: 1
        decision:
          $ref: '#/components/schemas/RuntimeDecision'
        metadata:
          type: object
          properties:
            engineVersion:
              type: string
            processedAt:
              type: string
              format: date-time
            latencyMs:
              type: integer
              minimum: 0
          additionalProperties: true
    RuntimeDecision:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: ['allow', 'deny', 'escalate', 'clarify']
        reason:
          type: string
          description: Primary stable machine-readable reason.
        reasons:
          type: array
          items:
            type: string
          description: Extended reason set for diagnostics.
        obligations:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeObligation'
        auditRefs:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeAuditRef'
    RuntimeObligation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          example: redact_output
        params:
          type: object
          additionalProperties: true
    RuntimeAuditRef:
      type: object
      required:
        - ref
      properties:
        ref:
          type: string
          description: Stable reference id in audit subsystem.
        href:
          type: string
          format: uri
        kind:
          type: string
          example: immutable_log
    RuntimeErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
            message:
              type: string
            retryable:
              type: boolean
              default: false
            details:
              type: object
              additionalProperties: true
