name: SDK Repo

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "LICENSE"
      - "NOTICE"
      - "public/**"
      - "src/**"
      - "test/**"
      - "tsconfig*.json"
      - "tools/**"
      - ".github/workflows/publish.yml"
      - ".github/workflows/sdk-workspace.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "LICENSE"
      - "NOTICE"
      - "public/**"
      - "src/**"
      - "test/**"
      - "tsconfig*.json"
      - "tools/**"
      - ".github/workflows/publish.yml"
      - ".github/workflows/sdk-workspace.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Repair Rollup optional native dependency
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')"; then
            ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').optionalDependencies['@rollup/rollup-linux-x64-gnu']")"
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi
      - name: Verify Repo
        run: npm run verify
