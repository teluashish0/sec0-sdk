name: SDK Repo

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "LICENSE"
      - "NOTICE"
      - "public/**"
      - "src/**"
      - "test/**"
      - "tsconfig*.json"
      - "tools/**"
      - ".github/workflows/sdk-workspace.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "LICENSE"
      - "NOTICE"
      - "public/**"
      - "src/**"
      - "test/**"
      - "tsconfig*.json"
      - "tools/**"
      - ".github/workflows/sdk-workspace.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Verify Repo
        run: npm run verify
