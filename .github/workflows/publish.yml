name: Publish SDK (Manual)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Enable publish commands (requires manual opt-in)
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci
      - name: Repair Rollup optional native dependency
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')"; then
            ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').optionalDependencies['@rollup/rollup-linux-x64-gnu']")"
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi

      - name: Verify
        run: npm run verify

      - name: Publish @coreax/sdk
        if: ${{ github.event.inputs.publish == 'true' }}
        env:
          SEC0_ALLOW_PUBLISH: "1"
          SEC0_PUBLISH_PACKAGE: "@coreax/sdk"
        run: npm publish --provenance --access public
